server:
  port: 9090

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/product/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka