server:
  port: 8086
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user_database
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka